name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Authorize Actions to write to the gh-pages branch.
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # When deploying to the root path using a custom domain, there is no need to set `BASE_URL`.
        # If deploying to the `/FossFLOW/` subpath instead, change it to:
        # run: BASE_URL=/FossFLOW/ npm run build

      # ── SPA Routing Fix: Copy index.html to 404.html ──
      # GitHub Pages returns 404.html when encountering an unknown path.
      # This ensures that the React application loads correctly when refreshing any arbitrary sub-path.
      - name: Fix SPA routing (copy index.html → 404.html)
        run: cp packages/fossflow-app/dist/index.html packages/fossflow-app/dist/404.html

      # ── Write Custom Domain CNAME File ──
      - name: Write CNAME
        run: echo "flow.nobita.club" > packages/fossflow-app/dist/CNAME
        # Replace with the subdomain you are actually using.
        
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/fossflow-app/dist
          force_orphan: true    # The `gh-pages` branch retains only the latest build and does not accumulate history.
